version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Havana"
    versioning-strategy: "increase"
    commit-message:
      prefix: "⬆️ deps"
      prefix-development: "🛠️ dev-deps"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 5
    reviewers: ["koowexa"]
    assignees: ["koowexa"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jquery"
        versions: [">= 4.0.0"]
      - dependency-name: "bootstrap"
        versions: ["< 5.0.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Havana"
    commit-message:
      prefix: "🔧 ci"
      include: "scope"
    labels: ["ci", "github-actions"]
    open-pull-requests-limit: 3
    reviewers: ["koowexa"]
    assignees: ["koowexa"]
    ignore:
      - dependency-name: "actions/checkout"
        versions: ["< 3.0.0"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "10:00"
      timezone: "America/Havana"
    commit-message:
      prefix: "🐳 docker"
    labels: ["docker", "dependencies"]
    open-pull-requests-limit: 2
    reviewers: ["koowexa"]
    assignees: ["koowexa"]
    ignore:
      - dependency-name: "node"
        versions: ["< 18.x"]