<!DOCTYPE html>
<html lang="es-CU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>KOOWEXA · Promocion</title>
    <meta name="description" content="Promoción exclusiva -25% en Plan Pago Fijo para emprendedores cubanos. Sitios web modernos, soporte rápido y diseño sin marca de agua.">
    <meta property="og:title" content="KOOWEXA · Promoción Limitada">
    <meta property="og:description" content="Ahorra $1500 CUP en tu sitio web profesional. Oferta válida hasta mayo 2026.">
    <meta property="og:image" content="https://github.com/KOOWEXA/oficial/raw/refs/heads/main/KOOWEXA.jpg">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0066FF;
            --secondary: #00D4AA;
            --accent: #7B61FF;
            --dark: #0A0E27;
            --gray-light: #D1D5DB;
            --gray: #9CA3AF;
            --white: #FFFFFF;
            --danger: #FF4D6D;
            --warning: #FFB347;
            --gradient-1: linear-gradient(135deg, #0066FF 0%, #00D4AA 100%);
            --gradient-2: linear-gradient(135deg, #7B61FF 0%, #0066FF 100%);
            --gradient-danger: linear-gradient(135deg, #FF4D6D, #FF8C42);
            --shadow-card: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 102, 255, 0.2) inset;
            --blur-bg: 18px;
            --transition-smooth: 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 15% 30%, rgba(0, 102, 255, 0.3) 0%, transparent 55%),
                        radial-gradient(circle at 85% 70%, rgba(0, 212, 170, 0.22) 0%, transparent 55%),
                        radial-gradient(circle at 40% 85%, rgba(123, 97, 255, 0.18) 0%, transparent 60%);
            z-index: -2;
            animation: gentlePulse 12s ease-in-out infinite;
        }

        @keyframes gentlePulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 48px 48px;
            z-index: -1;
            pointer-events: none;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        h1, h2, h3, .logo-text, .price-value {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .container {
            max-width: 780px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.25rem;
            animation: fadeSlide 0.7s ease-out;
        }
        .logo img {
            height: 3.4rem;
            width: auto;
            filter: drop-shadow(0 0 12px rgba(0, 102, 255, 0.5));
            transition: filter 0.4s;
        }
        .logo img:hover {
            filter: drop-shadow(0 0 22px rgba(0, 212, 170, 0.7));
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .promo-card {
            background: rgba(10, 14, 39, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2.8rem 2rem 2.2rem;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-card);
            transition: all var(--transition-smooth);
            animation: cardFloatUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(0, 102, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .promo-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 40px 70px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(0, 212, 170, 0.3) inset;
            border-color: rgba(0, 212, 170, 0.4);
        }

        @keyframes cardFloatUp {
            from { opacity: 0; transform: scale(0.96) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .promo-card.expired {
            filter: grayscale(0.45);
            pointer-events: none;
            opacity: 0.85;
            transition: 0.3s;
        }
        .promo-card.expired::after {
            content: 'OFERTA CADUCADA';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.8rem, 7vw, 3rem);
            font-weight: 800;
            font-family: 'Space Grotesk', sans-serif;
            color: rgba(255, 80, 100, 0.95);
            background: rgba(10, 14, 39, 0.88);
            backdrop-filter: blur(10px);
            letter-spacing: 4px;
            z-index: 10;
            border-radius: 48px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            border: 2px solid rgba(255, 77, 109, 0.5);
        }

        .discount-badge {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gradient-1);
            background-size: 150% auto;
            padding: 0.5rem 2rem;
            border-radius: 80px;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            box-shadow: 0 12px 22px rgba(0, 102, 255, 0.5);
            animation: badgePulse 2.2s ease-in-out infinite;
            white-space: nowrap;
            z-index: 5;
        }
        .discount-badge.near-expiry {
            background: var(--gradient-danger);
            animation: urgentPulse 0.9s infinite;
        }
        @keyframes badgePulse {
            0%, 100% { transform: translateX(-50%) translateY(0px); box-shadow: 0 8px 18px rgba(0, 102, 255, 0.5);}
            50% { transform: translateX(-50%) translateY(-5px); box-shadow: 0 18px 28px rgba(0, 212, 170, 0.6);}
        }
        @keyframes urgentPulse {
            0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); box-shadow: 0 0 10px #FF4D6D;}
            50% { opacity: 0.9; transform: translateX(-50%) scale(1.02); box-shadow: 0 0 22px #FF8C42;}
        }

        .plan-name {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(120deg, #FFF, #B0E0FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0.6rem 0 0.2rem;
            letter-spacing: -0.3px;
        }

        .plan-price {
            font-size: clamp(3.6rem, 12vw, 5.6rem);
            font-weight: 800;
            font-family: 'Space Grotesk', sans-serif;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.1;
            margin: 0.5rem 0 0.25rem;
            display: inline-flex;
            align-items: baseline;
            gap: 0.2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .plan-currency {
            font-size: 0.45em;
            font-weight: 600;
            color: var(--gray-light);
        }
        .plan-currency-code {
            font-size: 0.35em;
            font-weight: 700;
            color: var(--secondary);
        }
        .plan-period {
            font-size: 0.35em;
            font-weight: 500;
            color: var(--gray);
        }

        .savings {
            background: rgba(0, 212, 170, 0.12);
            padding: 0.45rem 1.2rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-block;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 212, 170, 0.3);
        }

        .features {
            list-style: none;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 0.75rem 1.2rem;
            margin: 1.6rem 0 1rem;
            text-align: left;
        }
        .features li {
            color: var(--gray-light);
            font-size: 0.92rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.4rem 0;
            border-bottom: 1px dashed rgba(255,255,255,0.06);
            transition: 0.2s;
        }
        .features li:hover {
            color: white;
            transform: translateX(5px);
        }
        .features li::before {
            content: "✓";
            color: var(--secondary);
            font-weight: 800;
            font-size: 1.2rem;
            background: rgba(0, 212, 170, 0.2);
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
        }

        .expiry-info {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.7rem;
            background: rgba(0, 0, 0, 0.35);
            padding: 0.7rem 1.4rem;
            border-radius: 100px;
            margin: 0.8rem 0 1.2rem;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .countdown-timer {
            background: rgba(0, 212, 170, 0.2);
            padding: 0.25rem 1rem;
            border-radius: 40px;
            font-weight: 700;
            font-family: monospace;
            font-size: 1rem;
            letter-spacing: 0.5px;
            color: var(--secondary);
            transition: 0.2s;
        }
        .countdown-timer.urgent {
            background: rgba(255, 77, 109, 0.3);
            color: #FFB3B3;
            text-shadow: 0 0 5px rgba(255,0,0,0.3);
            animation: softBlink 1s ease infinite;
        }
        @keyframes softBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .cta-button {
            background: var(--gradient-1);
            background-size: 150% auto;
            border: none;
            padding: 0.9rem 1.8rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.05rem;
            font-family: 'Inter', sans-serif;
            color: white;
            cursor: pointer;
            transition: all 0.25s;
            width: 100%;
            max-width: 320px;
            margin: 0.5rem auto 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 18px rgba(0, 102, 255, 0.4);
            letter-spacing: 0.5px;
        }
        .cta-button:hover:not(:disabled) {
            transform: scale(1.02);
            background-position: 100% 0;
            box-shadow: 0 12px 28px rgba(0, 102, 255, 0.7);
        }
        .cta-button:disabled {
            background: #4a5568;
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
            filter: grayscale(0.1);
        }

        .back-to-top {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 46px;
            height: 46px;
            background: var(--gradient-1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: 0.25s;
            box-shadow: 0 4px 16px rgba(0, 102, 255, 0.5);
            border: none;
            z-index: 99;
        }
        .back-to-top.show {
            opacity: 1;
            visibility: visible;
        }
        .back-to-top:hover {
            transform: translateY(-3px);
            background: var(--gradient-2);
        }

        @media (max-width: 560px) {
            body {
                padding: 1rem;
            }
            .promo-card {
                padding: 2rem 1.2rem 1.6rem;
            }
            .features {
                grid-template-columns: 1fr;
                gap: 0.2rem;
            }
            .expiry-info {
                flex-direction: column;
                align-items: center;
                border-radius: 32px;
                padding: 0.7rem;
            }
            .discount-badge {
                font-size: 0.75rem;
                padding: 0.35rem 1.4rem;
                white-space: nowrap;
            }
            .cta-button {
                max-width: 100%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <header class="container">
        <div class="logo">
            <img src="favicon.svg" alt="KOOWEXA">
        </div>
    </header>

    <main class="container">
        <div class="promo-card" data-expiry="2026-05-15">
            <span class="discount-badge" id="discountBadge">🔥 --5000 DESCUENTO 🔥</span>
            <h2 class="plan-name">PLAN FIJO</h2>
            <div class="plan-price">
                <span class="plan-currency">$</span>10000<span class="plan-currency-code">/CUP</span><span class="plan-period">Año</span>
            </div>
            <p class="savings">Antes <s>$15000 CUP</s> · Oferta especial</p>
            
            <ul class="features">
                <li>Todas las características del plan fijo</li>
            </ul>

            <div class="expiry-info">
                <span class="icon">📅</span>
                <span>Válido hasta <strong id="expiryDateStrong">15 de mayo de 2026</strong></span>
                <span id="countdownDisplay" class="countdown-timer">--d --h --m --s</span>
            </div>

            <button id="ctaMainButton" class="cta-button">✨ Solicitar promoción ✨</button>
            <p style="font-size: 0.7rem; margin-top: 0.8rem; opacity: 0.65;">⭐ Cupos limitados · Contacta hoy mismo</p>
        </div>
    </main>

    <button id="backToTop" class="back-to-top" aria-label="Subir">↑</button>

    <script>
        (function() {
            const card = document.querySelector('.promo-card');
            const expiryAttr = card?.getAttribute('data-expiry');
            const countdownSpan = document.getElementById('countdownDisplay');
            const ctaBtn = document.getElementById('ctaMainButton');
            const discountBadge = document.getElementById('discountBadge');
            let expiryTimestamp = null;
            let timerInterval = null;

            function setExpiryDate() {
                if (!expiryAttr) return null;
                const parts = expiryAttr.split('-').map(Number);
                const expiryDateTime = new Date(parts[0], parts[1] - 1, parts[2], 23, 59, 59, 999);
                return expiryDateTime.getTime();
            }

            function getRemainingTime(nowTimestamp, expiryMs) {
                const diff = expiryMs - nowTimestamp;
                if (diff <= 0) return null;
                const secondsTotal = Math.floor(diff / 1000);
                const days = Math.floor(secondsTotal / 86400);
                const hours = Math.floor((secondsTotal % 86400) / 3600);
                const minutes = Math.floor((secondsTotal % 3600) / 60);
                const seconds = secondsTotal % 60;
                return { days, hours, minutes, seconds, totalMs: diff };
            }

            function formatCountdown(remaining) {
                if (!remaining) return "00d 00h 00m 00s";
                const { days, hours, minutes, seconds } = remaining;
                return `${days}d ${hours.toString().padStart(2,'0')}h ${minutes.toString().padStart(2,'0')}m ${seconds.toString().padStart(2,'0')}s`;
            }

            function evaluateUrgency(remaining) {
                if (!remaining) return { isUrgent: false, level: 'expired' };
                const daysLeft = remaining.days;
                if (daysLeft <= 2) return { isUrgent: true, level: 'critical', message: '⚠️ ÚLTIMOS DÍAS' };
                if (daysLeft <= 7) return { isUrgent: true, level: 'warning', message: '⏰ ¡Plazo final!' };
                return { isUrgent: false, level: 'normal' };
            }

            function updateExpirationUI() {
                if (!expiryTimestamp || !card || !countdownSpan) return;
                
                const now = Date.now();
                const remainingObj = getRemainingTime(now, expiryTimestamp);
                
                if (!remainingObj || remainingObj.totalMs <= 0) {
                    if (!card.classList.contains('expired')) {
                        card.classList.add('expired');
                        if (ctaBtn) {
                            ctaBtn.disabled = true;
                            ctaBtn.textContent = '❌ Promoción caducada ❌';
                        }
                        if (countdownSpan) {
                            countdownSpan.textContent = '00d 00h 00m 00s';
                            countdownSpan.classList.remove('urgent');
                        }
                        if (discountBadge) {
                            discountBadge.textContent = '❌ OFERTA FINALIZADA ❌';
                            discountBadge.style.background = "linear-gradient(135deg, #5a626e, #3a3f4b)";
                        }
                    }
                    if (timerInterval) clearInterval(timerInterval);
                    return;
                }
                
                if (card.classList.contains('expired')) {
                    card.classList.remove('expired');
                    if (ctaBtn) {
                        ctaBtn.disabled = false;
                        ctaBtn.textContent = '✨ Solicitar promoción ✨';
                    }
                    if (discountBadge) {
                        discountBadge.textContent = '🔥 -25% DESCUENTO 🔥';
                        discountBadge.style.background = "";
                    }
                }
                
                const formatted = formatCountdown(remainingObj);
                countdownSpan.textContent = formatted;
                
                const urgency = evaluateUrgency(remainingObj);
                if (urgency.isUrgent) {
                    countdownSpan.classList.add('urgent');
                    if (discountBadge && !discountBadge.classList.contains('near-expiry')) {
                        discountBadge.classList.add('near-expiry');
                        if (urgency.level === 'critical') {
                            discountBadge.textContent = '🚨 ¡ÚLTIMAS HORAS! -25% 🚨';
                        } else {
                            discountBadge.textContent = '⏳ ¡APROVECHA! -25% ⏳';
                        }
                    }
                } else {
                    countdownSpan.classList.remove('urgent');
                    if (discountBadge && discountBadge.classList.contains('near-expiry')) {
                        discountBadge.classList.remove('near-expiry');
                        discountBadge.textContent = '🔥 -25% DESCUENTO 🔥';
                    }
                }
                
                if (remainingObj.days === 0 && remainingObj.hours <= 12 && ctaBtn && !ctaBtn.disabled) {
                    ctaBtn.style.background = "linear-gradient(135deg, #FF4D6D, #FFB347)";
                    if (remainingObj.hours <= 2) {
                        ctaBtn.textContent = '⚡ Última oportunidad ⚡';
                    } else {
                        ctaBtn.textContent = '🔥 Reserva YA - Últimos cupos 🔥';
                    }
                } else if (ctaBtn && !ctaBtn.disabled && !card.classList.contains('expired')) {
                    ctaBtn.style.background = "";
                    ctaBtn.textContent = '✨ Solicitar promoción ✨';
                }
            }
            
            function startLiveCountdown() {
                if (timerInterval) clearInterval(timerInterval);
                updateExpirationUI();
                timerInterval = setInterval(() => {
                    updateExpirationUI();
                    if (card && card.classList.contains('expired')) {
                        if (timerInterval) clearInterval(timerInterval);
                        timerInterval = null;
                    }
                }, 1000);
            }
            
            function setupCTA() {
                if (!ctaBtn) return;
                ctaBtn.addEventListener('click', (e) => {
                    if (ctaBtn.disabled || (card && card.classList.contains('expired'))) {
                        e.preventDefault();
                        return;
                    }
                    const toastMsg = document.createElement('div');
                    toastMsg.textContent = '📢 ¡Oferta reservada! Escríbenos a contacto@koowexa.com o por WhatsApp al +53 12345678 (demo) para formalizar.';
                    toastMsg.style.position = 'fixed';
                    toastMsg.style.bottom = '30px';
                    toastMsg.style.left = '50%';
                    toastMsg.style.transform = 'translateX(-50%)';
                    toastMsg.style.backgroundColor = '#0A0E27cc';
                    toastMsg.style.backdropFilter = 'blur(10px)';
                    toastMsg.style.color = '#00D4AA';
                    toastMsg.style.padding = '0.8rem 1.6rem';
                    toastMsg.style.borderRadius = '50px';
                    toastMsg.style.fontSize = '0.85rem';
                    toastMsg.style.fontWeight = '500';
                    toastMsg.style.border = '1px solid #00D4AA';
                    toastMsg.style.zIndex = '1000';
                    toastMsg.style.fontFamily = 'Inter, sans-serif';
                    toastMsg.style.boxShadow = '0 8px 20px rgba(0,0,0,0.4)';
                    document.body.appendChild(toastMsg);
                    setTimeout(() => {
                        toastMsg.style.opacity = '0';
                        setTimeout(() => toastMsg.remove(), 600);
                    }, 4000);
                });
            }
            
            const backBtn = document.getElementById('backToTop');
            function handleScroll() {
                if (window.scrollY > 280) backBtn?.classList.add('show');
                else backBtn?.classList.remove('show');
            }
            if (backBtn) {
                backBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
                window.addEventListener('scroll', handleScroll);
                handleScroll();
            }

            function init() {
                const expMs = setExpiryDate();
                if (expMs) {
                    expiryTimestamp = expMs;
                    startLiveCountdown();
                } else {
                    if (countdownSpan) countdownSpan.textContent = "FECHA NO VÁLIDA";
                }
                setupCTA();
                const strongDate = document.getElementById('expiryDateStrong');
                if (strongDate) strongDate.textContent = "15 de mayo de 2026";
            }
            
            init();
        })();
    </script>
</body>
</html>
